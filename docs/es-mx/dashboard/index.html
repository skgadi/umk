<!doctype html><html lang=en><head><meta charset=utf-8><title>Dashboard</title><link type=text/css rel=stylesheet href=https://cdn.firebase.com/libs/firebaseui/3.5.2/firebaseui.css><link type=text/css rel=stylesheet href=https://umk.skgadi.com//css/dashboard.min.css><link rel="manifest" href="/manifest.json">
</head><body><div id=signed-out><div id=firebaseui-auth-container></div></div><div id=signed-in><button>Sign out</button></div><script src=https://www.gstatic.com/firebasejs/7.19.1/firebase-app.js></script><script src=https://www.gstatic.com/firebasejs/7.19.1/firebase-analytics.js></script><script src=https://www.gstatic.com/firebasejs/7.19.1/firebase-auth.js></script><script src=https://www.gstatic.com/firebasejs/7.19.1/firebase-firestore.js></script><script src=https://cdn.firebase.com/libs/firebaseui/3.5.2/firebaseui.js></script><script async src="https://www.googletagmanager.com/gtag/js?id=G-C8DJLT8TXF"></script><script src=https://umk.skgadi.com//script/config.min.js></script><script src=https://umk.skgadi.com//script/dashboard.min.js></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').then(reg => {

      // READY MESSAGE
      navigator.serviceWorker.addEventListener('message', event => {
        if (event.data && event.data.type === 'READY') {
          alert("✅ App is ready for offline use!");
        }
      });

      // UPDATE DETECTED
      reg.onupdatefound = () => {
        const newWorker = reg.installing;
        newWorker.onstatechange = () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            alert("🔄 New version available. Refresh to update.");
          }
        };
      };

    });
  });
}
</script>

</body></html>
