<!DOCTYPE html><html lang="en"><head><title>three.js webgl - cloth simulation</title><meta charset="utf-8"><meta name="viewport" content="width=device-width,user-scalable=no,minimum-scale=1,maximum-scale=1"><link rel="shortcut icon" type="image/x-icon" href="../favicon.ico"><link rel="stylesheet" href="../dependencies/fa/css/all.min.css"><link type="text/css" rel="stylesheet" href="css/three.min.css"></head><body><div id="controls"><div class="ctl-btn" id="step-back"><i class="fas fa-step-backward fa-fw"></i></div><div class="ctl-btn" id="play-back"></div><div class="ctl-btn" id="play"><i class="fas fa-pause fa-fw"></i></div><div class="ctl-btn" id="step"><i class="fas fa-step-forward fa-fw"></i></div><input id="ctl-slider" type="range" min="0" max="0" value="0" class="slide" step="1"><div id="ctl-info"><i class="far fa-hourglass"></i></div></div><script type="module" src="robot-6dof.min.js"></script>
<link rel="manifest" href="/manifest.json">

<div id="pwa-status" style="
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: #222;
  color: white;
  padding: 15px;
  border-radius: 10px;
  font-family: sans-serif;
  z-index: 9999;
  display: none;
">
  <div id="pwa-text">Installing...</div>
  <div style="background:#555; height:6px; border-radius:5px; margin-top:8px;">
    <div id="pwa-bar" style="
      height:6px;
      width:0%;
      background:#4caf50;
      border-radius:5px;
      transition: width 0.2s;
    "></div>
  </div>
</div>

<script>
const box = document.getElementById("pwa-status");
const text = document.getElementById("pwa-text");
const bar = document.getElementById("pwa-bar");

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js');

  navigator.serviceWorker.addEventListener('message', event => {
    const data = event.data;

    if (data.type === "CACHE_PROGRESS") {
      box.style.display = "block";
      const percent = Math.round((data.done / data.total) * 100);
      text.innerText = "Installing... " + percent + "%";
      bar.style.width = percent + "%";
    }

    if (data.type === "CACHE_COMPLETE") {
      text.innerText = "Offline ready!";
      bar.style.width = "100%";
      setTimeout(() => box.style.display = "none", 3000);
    }

    if (data.type === "NEW_VERSION") {
      box.style.display = "block";
      text.innerText = "New version updated!";
      bar.style.width = "100%";
      setTimeout(() => box.style.display = "none", 4000);
    }
  });
}
</script>

</body></html>
