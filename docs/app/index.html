<!doctype html><html><head><title>HTML Redirect</title><meta http-equiv=refresh content="1; url = latest"></head><body><h1 style=text-align:center;color:green>Uyamak editor</h1><p style=text-align:center>If your browser supports Refresh, you'll be redirected to the app. If it takes longer, please <a href=/latest/>click here</a>.</p>
<link rel="manifest" href="/manifest.json">

<div id="pwa-status" style="
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: #222;
  color: white;
  padding: 15px;
  border-radius: 10px;
  font-family: sans-serif;
  z-index: 9999;
  display: none;
">
  <div id="pwa-text">Installing...</div>
  <div style="background:#555; height:6px; border-radius:5px; margin-top:8px;">
    <div id="pwa-bar" style="
      height:6px;
      width:0%;
      background:#4caf50;
      border-radius:5px;
      transition: width 0.2s;
    "></div>
  </div>
</div>

<script>
const box = document.getElementById("pwa-status");
const text = document.getElementById("pwa-text");
const bar = document.getElementById("pwa-bar");

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js');

  navigator.serviceWorker.addEventListener('message', event => {
    const data = event.data;

    if (data.type === "CACHE_PROGRESS") {
      box.style.display = "block";
      const percent = Math.round((data.done / data.total) * 100);
      text.innerText = "Installing... " + percent + "%";
      bar.style.width = percent + "%";
    }

    if (data.type === "CACHE_COMPLETE") {
      text.innerText = "Offline ready!";
      bar.style.width = "100%";
      setTimeout(() => box.style.display = "none", 3000);
    }

    if (data.type === "NEW_VERSION") {
      box.style.display = "block";
      text.innerText = "New version updated!";
      bar.style.width = "100%";
      setTimeout(() => box.style.display = "none", 4000);
    }
  });
}
</script>

</body></html>
