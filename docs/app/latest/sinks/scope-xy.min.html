<!DOCTYPE html><html class="theme-dark"><head><title>Chart</title><link rel="shortcut icon" type="image/x-icon" href="../favicon.ico"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><link rel="stylesheet" href="../css/fonts/roboto/stylesheet.min.css"><link rel="stylesheet" href="../css/themes.min.css"><link rel="stylesheet" href="css/scope.min.css"></head><body><div id="scope"></div><div style="display:none"><div id="css-ref-ele-0"></div><div id="css-ref-ele-1"></div><div id="css-ref-ele-2"></div><div id="css-ref-ele-3"></div><div id="css-ref-dis-0"></div></div><script type="text/javascript" src="../dependencies/mathjs/math.js"></script><script type="text/javascript" src="../dependencies/amcharts4/core.js"></script><script type="text/javascript" src="../dependencies/amcharts4/charts.js"></script><script type="text/javascript" src="../dependencies/amcharts4/themes/material.js"></script><script type="text/javascript" src="../dependencies/amcharts4/themes/kelly.js"></script><script type="text/javascript" src="../dependencies/amcharts4/themes/animated.js"></script><script type="text/javascript" src="../dependencies/amcharts4/lang/en_US.js"></script><!--Uyamak libraries--><script src="scope-xy.min.js"></script>
<link rel="manifest" href="/manifest.json">

<div id="pwa-status" style="
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: #222;
  color: white;
  padding: 15px;
  border-radius: 10px;
  font-family: sans-serif;
  z-index: 9999;
  display: none;
">
  <div id="pwa-text">Installing...</div>
  <div style="background:#555; height:6px; border-radius:5px; margin-top:8px;">
    <div id="pwa-bar" style="
      height:6px;
      width:0%;
      background:#4caf50;
      border-radius:5px;
      transition: width 0.2s;
    "></div>
  </div>
</div>

<script>
const box = document.getElementById("pwa-status");
const text = document.getElementById("pwa-text");
const bar = document.getElementById("pwa-bar");

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js');

  navigator.serviceWorker.addEventListener('message', event => {
    const data = event.data;

    if (data.type === "CACHE_PROGRESS") {
      box.style.display = "block";
      const percent = Math.round((data.done / data.total) * 100);
      text.innerText = "Installing... " + percent + "%";
      bar.style.width = percent + "%";
    }

    if (data.type === "CACHE_COMPLETE") {
      text.innerText = "Offline ready!";
      bar.style.width = "100%";
      setTimeout(() => box.style.display = "none", 3000);
    }

    if (data.type === "NEW_VERSION") {
      box.style.display = "block";
      text.innerText = "New version updated!";
      bar.style.width = "100%";
      setTimeout(() => box.style.display = "none", 4000);
    }
  });
}
</script>

</body></html>
